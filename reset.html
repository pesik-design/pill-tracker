<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Скидання кешу — пілюлі</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef1f8;
      font-family:"Segoe UI",system-ui,sans-serif;color:#191d27}
    .box{text-align:center;background:#fff;border:1px solid #e3e7ee;border-radius:20px;
      padding:32px 28px;box-shadow:0 20px 50px -30px rgba(28,40,72,.4);max-width:360px}
    .dot{width:52px;height:52px;border-radius:16px;background:linear-gradient(140deg,#5a9be8,#3a86e0);
      margin:0 auto 16px;display:grid;place-items:center}
    .dot::after{content:"";width:18px;height:18px;border-radius:50%;background:#fff}
    h1{font-size:19px;margin:0 0 8px}
    p{color:#7a8290;font-size:14px;margin:0 0 6px;line-height:1.5}
    b{color:#28966a}
  </style>
</head>
<body>
  <div class="box">
    <div class="dot"></div>
    <h1>Чищу кеш…</h1>
    <p id="msg">Прибираю стару версію застосунку.</p>
  </div>
  <script>
    (async function () {
      try {
        if ('serviceWorker' in navigator) {
          const rs = await navigator.serviceWorker.getRegistrations();
          for (const r of rs) await r.unregister();
        }
        if (window.caches) {
          const ks = await caches.keys();
          for (const k of ks) await caches.delete(k);
        }
      } catch (e) {}
      document.getElementById('msg').innerHTML = '<b>Готово ✓</b> Відкриваю свіжу версію…';
      setTimeout(function () { location.replace('index.html?fresh=' + Date.now()); }, 900);
    })();
  </script>
</body>
</html>
